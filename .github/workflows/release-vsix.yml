name: Release VSIX

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      changelog:
        description: Changelog / release notes
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump
        run: |
          npm version "${{ inputs.bump_type }}" --no-git-tag-version
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        id: build
        run: |
          npm run package:vsix
          VSIX_FILE="$(node -p "require('./package.json').name + '-' + require('./package.json').version + '.vsix'")"
          if [ ! -f "$VSIX_FILE" ]; then
            echo "Expected VSIX file '$VSIX_FILE' was not created."
            exit 1
          fi
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 1
          fi
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          body: ${{ inputs.changelog }}
          files: ${{ steps.build.outputs.vsix_file }}
